services:
  - type: web
    name: gestor-sri-ice
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-db
          property: connectionString

databases:
  - name: gestor-db
    plan: free