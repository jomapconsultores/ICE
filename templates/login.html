{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <i class="bi bi-calculator-fill text-primary" style="font-size:2.5rem;"></i>
                    <h5 class="fw-bold mt-2">Iniciar Sesión</h5>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-2">
                        <input type="email" class="form-control form-control-sm" name="email" placeholder="Email" required>
                    </div>
                    <div class="mb-2">
                        <input type="password" class="form-control form-control-sm" name="password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-100">Ingresar</button>
                </form>
                <p class="text-center small mt-2 mb-0"><a href="{{ url_for('auth.register') }}">Registrarse</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
