{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <i class="bi bi-person-plus-fill text-success" style="font-size:2.5rem;"></i>
                    <h5 class="fw-bold mt-2">Crear Cuenta</h5>
                </div>
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-2"><input type="text" class="form-control form-control-sm" name="nombre" placeholder="Nombre completo" required></div>
                    <div class="mb-2"><input type="email" class="form-control form-control-sm" name="email" placeholder="Email" required></div>
                    <div class="row mb-2">
                        <div class="col-6"><input type="text" class="form-control form-control-sm" name="empresa" placeholder="Empresa"></div>
                        <div class="col-6"><input type="text" class="form-control form-control-sm" name="ruc" placeholder="RUC" maxlength="13"></div>
                    </div>
                    <div class="mb-2"><input type="password" class="form-control form-control-sm" name="password" placeholder="Contraseña (6+ caracteres)" required minlength="6"></div>
                    <div class="mb-2"><input type="password" class="form-control form-control-sm" name="confirmar" placeholder="Confirmar contraseña" required></div>
                    <button type="submit" class="btn btn-success btn-sm w-100">Registrarme</button>
                </form>
                <p class="text-center small mt-2 mb-0"><a href="{{ url_for('auth.login') }}">Ya tengo cuenta</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
